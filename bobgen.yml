# no_tests: true
plugins_preset: default
plugins:
  dbinfo:
    disabled: false
    pkgname: "dbinfo"
    destination: "db/dbinfo"
  enums:
    disabled: false
    pkgname: "enums"
    destination: "db/enums"
  models:
    disabled: false
    pkgname: "models"
    destination: "db/models"
  factory:
    disabled: false
    pkgname: "factory"
    destination: "db/factory"
  dberrors:
    disabled: false
    pkgname: "dberrors"
    destination: "db/dberrors"
  where:
    disabled: false
  loaders:
    disabled: false
  joins:
    disabled: false
aliases:
  series:
    up_plural: "Serieses"
    up_singular: "Series"
    down_plural: "serieses"
    down_singular: "series"

replacements:
  - tables: [ "booking_entries" ]
    match:
      name: "source_type"
    replace: "mytypes.SourceType"
  - tables: [ "booking_entries" ]
    match:
      name: "target_type"
    replace: "mytypes.TargetType"
  - tables: [ "import_batches" ]
    match:
      name: "import_format"
    replace: "mytypes.ImportFormat"
  - tables: [ "import_batches" ]
    match:
      name: "metadata_json"
    replace: "mytypes.ImportBatchMeta"
  - tables: [ "result_entries" ]
    match:
      name: "team_drivers"
    replace: "mytypes.TeamDrivers"

types:
  "mytypes.SourceType":
    imports: [ "mytypes \"github.com/srlmgr/backend/db/mytypes\"" ]
    no_randomization_test: true
    random_expr: |
      return "finish_pos"
  "mytypes.TargetType":
    imports: [ "mytypes \"github.com/srlmgr/backend/db/mytypes\"" ]
    no_randomization_test: true
    random_expr: |
      return "driver"
  "mytypes.ImportFormat":
    imports: [ "mytypes \"github.com/srlmgr/backend/db/mytypes\"" ]
    no_randomization_test: true
    random_expr: |
      return "json"
  "mytypes.TeamDrivers":
    imports: [ "mytypes \"github.com/srlmgr/backend/db/mytypes\"" ]
    no_randomization_test: true
    random_expr: |
      return mytypes.TeamDrivers{}
  "mytypes.RaceSimImportFormat":
    imports: [ "mytypes \"github.com/srlmgr/backend/db/mytypes\"" ]
    no_randomization_test: true
    random_expr: |
      return mytypes.RaceSimImportFormat{}
  "mytypes.ImportBatchMeta":
    imports: [ "mytypes \"github.com/srlmgr/backend/db/mytypes\"" ]
    no_randomization_test: true
    random_expr: |
      return mytypes.ImportBatchMeta{}

psql:
  # The DSN is read from the PSQL_DSN environment variable, so it is not hardcoded here.
  driver: github.com/jackc/pgx/v5/stdlib
  except:
    "schema_migrations":
